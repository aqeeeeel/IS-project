environment = "dev"

[logging]
level = "INFO"
format = "%(asctime)s | %(levelname)s | %(name)s | %(message)s"

[puf]
challenge_size = 256
nonce_ttl_seconds = 60
max_retries = 3

[server]
host = "127.0.0.1"
port = 8080
request_timeout_seconds = 15

[encryption]
algorithm = "AES-GCM"
key_size_bits = 256
key_rotation_hours = 24

[ml]
model_name = "protected-model"
parameter_chunk_size = 1048576
